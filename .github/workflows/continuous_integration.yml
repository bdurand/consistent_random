name: Continuous Integration

on:
  push:
    branches:
      - main
      - actions-*
    tags:
      - v*
  pull_request:
    branches-ignore:
      - actions-*

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "ruby"
            standardrb: true
            yard: true
          - ruby: "ruby"
            appraisal: "no_dependencies"
          - ruby: "3.3"
            appraisal: "activejob_8"
          - ruby: "3.1"
            appraisal: "activejob_7"
          - ruby: "2.6"
            appraisal: "activejob_6"
          - ruby: "3.2"
            appraisal: "sidekiq_7"
          - ruby: "2.6"
            appraisal: "sidekiq_6"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Ruby CI
        uses: bdurand/github-actions/ruby-ci@v1.0.3
        with:
          ruby: ${{ matrix.ruby }}
          appraisal: ${{ matrix.appraisal }}
          bundler: ${{ matrix.bundler }}
          standardrb: ${{ matrix.standardrb }}
          yard: ${{ matrix.yard }}
          frozen_strings: ${{ matrix.frozen_strings }}
